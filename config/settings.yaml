# Configuración global del bot
schedule:
  cron: "0 9 * * 1"          # Todos los lunes a las 9am
  timezone: "America/Bogota"

platforms:
  linkedin:
    enabled: true
    easy_apply_only: true     # Solo Easy Apply, no links externos
    max_applications_per_run: 15
    search_limit: 50          # Cuántas ofertas revisar por ejecución
    delays:
      between_actions: [2, 5]  # segundos aleatorios entre acciones
      between_applications: [10, 20]

ai:
  provider: "gemini"
  model: "gemini-2.5-flash"  # gemini-1.5-flash fue retirado por Google
  min_match_score: 70        # Score mínimo (0-100) para aplicar

notifications:
  send_summary: true
  language: "es"             # Idioma del email de resumen
