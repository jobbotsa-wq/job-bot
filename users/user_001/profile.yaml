# Perfil de búsqueda — editar con tus datos reales
personal:
  name: "Tu Nombre"
  email_notifications: "tu_correo_notificaciones@gmail.com"
  cv_path: "./cv.pdf"                          # Ruta relativa a esta carpeta
  linkedin_profile_url: "https://www.linkedin.com/in/tu-perfil"

search:
  keywords:
    - "Python Developer"
    - "Backend Engineer"
    - "Software Engineer"
  modality:
    - remote                                   # remote | hybrid | onsite
  experience_years:
    min: 1
    max: 10
  locations:                                   # Aplica si no es 100% remoto
    - "Colombia"
  languages:
    - "Spanish"
    - "English"
  exclude_keywords:                            # Palabras que descartan la oferta
    - "Presencial obligatorio"
    - "Solo residentes en"

filters:
  min_match_score: 70                          # Sobreescribe el global si se define
  max_applications_per_run: 15
  skip_already_applied: true

platforms:
  linkedin:
    enabled: true
